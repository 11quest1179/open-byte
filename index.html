<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Developer Assistant</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        /* Modern Dark Theme */
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f0f0f; color: #ececec; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        h2 { color: #007bff; margin-top: 20px; }

        /* The Chat Container */
        #chat-box { 
            width: 100%; max-width: 900px; height: 70vh; 
            background: #181818; padding: 20px; overflow-y: auto; 
            border-radius: 12px; border: 1px solid #2a2a2a;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* Message Bubbles */
        .bubble { max-width: 85%; padding: 12px 18px; border-radius: 15px; line-height: 1.6; font-size: 15px; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #262626; border: 1px solid #333; color: #e0e0e0; border-bottom-left-radius: 2px; width: auto; }

        /* Code Block Styling */
        pre { 
            background: #000 !important; 
            padding: 15px; 
            border-radius: 8px; 
            overflow-x: auto; 
            position: relative; 
            border: 1px solid #444;
            margin: 10px 0;
        }
        code { font-family: 'Fira Code', monospace !important; font-size: 13px; }

        /* Copy Button inside Code Blocks */
        .copy-btn {
            position: absolute; right: 8px; top: 8px;
            background: #333; color: #fff; border: 1px solid #555;
            padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #555; }

        /* Input Area */
        .input-area { width: 100%; max-width: 900px; display: flex; margin-top: 20px; gap: 10px; padding-bottom: 20px; }
        input { flex: 1; padding: 15px; border-radius: 8px; border: 1px solid #333; background: #262626; color: white; outline: none; font-size: 16px; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 0 30px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }

        /* Scrollbar Styling */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <h2>AI Personal Assistant</h2>
    <div id="chat-box">
        <div class="bubble ai-msg">Hello! I can write code, answer questions, and more. Try asking me to "Write a Python script for a calculator."</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Message your AI..." onkeypress="if(event.key==='Enter') askAI()">
        <button onclick="askAI()">Send</button>
    </div>

    <script>
        async function askAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim();
            if (!userText) return;

            // 1. Add User Message
            chatBox.innerHTML += `<div class="bubble user-msg">${userText}</div>`;
            input.value = "";

            // 2. Create AI Placeholder
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'bubble ai-msg';
            aiMsgDiv.innerHTML = "<i>Thinking...</i>";
            chatBox.appendChild(aiMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. Get AI Response (using gpt-4o-mini via Puter)
                const response = await puter.ai.chat(userText, { model: 'gpt-4o-mini' });
                
                // 4. Convert Markdown to HTML
                const htmlResponse = marked.parse(response);
                aiMsgDiv.innerHTML = htmlResponse;

                // 5. Setup Copy Buttons for each code block
                aiMsgDiv.querySelectorAll('pre').forEach((block) => {
                    // Create button
                    const button = document.createElement('button');
                    button.innerText = 'Copy';
                    button.className = 'copy-btn';
                    block.appendChild(button);

                    // Add click event
                    button.addEventListener('click', () => {
                        const codeText = block.querySelector('code').innerText;
                        navigator.clipboard.writeText(codeText);
                        button.innerText = 'Copied!';
                        setTimeout(() => button.innerText = 'Copy', 2000);
                    });
                });

                // 6. Apply Syntax Highlighting
                Prism.highlightAllUnder(aiMsgDiv);

            } catch (error) {
                aiMsgDiv.innerHTML = `<span style="color: #ff6b6b;">Error: ${error.message}</span>`;
            }
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
