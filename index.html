<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Assistant</title>
    
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000000; 
            color: #ffffff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Keeps the whole page from bouncing, scroll happens in chat-box */
        }

        h2 { 
            font-size: 1.1rem; 
            text-align: center; 
            padding: 15px 0; 
            margin: 0;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid #222;
            flex-shrink: 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        #chat-box { 
            flex: 1; 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto;
            padding: 20px 15px; 
            overflow-y: auto; /* Re-enables scrolling for both mouse and touch */
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            -webkit-overflow-scrolling: touch; /* Smooth scroll for iOS */
        }

        /* Visible but subtle scrollbar for Laptop users */
        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-track { background: transparent; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        /* Message Bubbles */
        .bubble { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            line-height: 1.5; 
            font-size: 16px; 
            word-wrap: break-word; 
        }
        
        .user-msg { 
            align-self: flex-end; 
            background: #007bff; 
            color: #ffffff;
            border-bottom-right-radius: 4px; 
        }
        
        .ai-msg { 
            align-self: flex-start; 
            background: #1c1c1e; 
            border: 1px solid #2c2c2e; 
            border-bottom-left-radius: 4px; 
        }

        /* Code Block Styling */
        pre { 
            background: #000 !important; 
            padding: 14px; 
            border-radius: 12px; 
            overflow-x: auto; 
            position: relative; 
            border: 1px solid #333;
            margin: 10px 0;
        }
        code { font-family: 'Fira Code', monospace !important; font-size: 13px; color: #fff !important; }

        .copy-btn { 
            position: absolute; right: 8px; top: 8px; 
            background: #333; color: #fff; border: none; 
            padding: 5px 10px; border-radius: 6px; font-size: 11px;
            cursor: pointer;
        }

        /* Footer Input Area */
        .input-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            background: #000;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }

        .input-area { display: flex; gap: 10px; align-items: center; }

        input { 
            flex: 1; 
            padding: 14px 20px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            background: #1c1c1e; 
            color: #ffffff; 
            outline: none; 
            font-size: 16px; 
        }
        input:focus { border-color: #007bff; }
        
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            width: 48px;
            height: 48px;
            border-radius: 50%; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.9); }
        button svg { width: 20px; height: 20px; fill: white; }

        @media (max-width: 600px) {
            .bubble { max-width: 90%; }
            h2 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <h2>AI Personal Assistant</h2>
    
    <div id="chat-box">
        <div class="bubble ai-msg">Hello! I'm optimized for your phone and laptop now. How can I help?</div>
    </div>

    <div class="input-container">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
            <button onclick="askAI()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // Keyboard Support
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') askAI();
        });

        async function askAI() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userText = input.value.trim();
            
            if (!userText) return;

            // User Message
            chatBox.innerHTML += `<div class="bubble user-msg">${userText}</div>`;
            input.value = ""; 
            chatBox.scrollTop = chatBox.scrollHeight;

            // AI Loading Bubble
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'bubble ai-msg';
            aiMsgDiv.innerHTML = "<i>Thinking...</i>";
            chatBox.appendChild(aiMsgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await puter.ai.chat(userText, { model: 'gpt-4o-mini' });
                
                // Object Extraction Fix
                let aiString = "";
                if (typeof response === 'string') aiString = response;
                else aiString = response.text || (response.message && response.message.content) || JSON.stringify(response);

                // Format & Render
                aiMsgDiv.innerHTML = marked.parse(String(aiString));

                // Code Copy Support
                aiMsgDiv.querySelectorAll('pre').forEach((block) => {
                    const btn = document.createElement('button');
                    btn.innerText = 'Copy';
                    btn.className = 'copy-btn';
                    block.appendChild(btn);
                    btn.onclick = () => {
                        const codeText = block.querySelector('code').innerText;
                        navigator.clipboard.writeText(codeText);
                        btn.innerText = '✓';
                        setTimeout(() => btn.innerText = 'Copy', 2000);
                    };
                });

                // Syntax Highlighting
                Prism.highlightAllUnder(aiMsgDiv);

            } catch (error) {
                aiMsgDiv.innerHTML = `<span style="color: #ff6b6b;">Error: ${error.message}</span>`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
